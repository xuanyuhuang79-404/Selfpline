<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfpline - 习惯管理与 AI 指导师</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/plan-detail.css">
    <link rel="stylesheet" href="css/ai-coach.css">
    <link rel="stylesheet" href="css/ai-classroom.css">
    <link rel="stylesheet" href="css/health-checkin.css">
    <link rel="stylesheet" href="css/community.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/workspace.css">
</head>
<body>
    <div id="app" class="app-shell">
        <!-- 左侧导航栏 -->
        <nav id="bottom-nav" class="app-sidebar" aria-label="主导航">
            <div class="sidebar-brand">
                <span class="brand-mark">S</span>
                <span class="brand-copy">
                    <span class="brand-name">Selfpline</span>
                    <span class="brand-tagline">习惯工作台</span>
                </span>
            </div>
            <button class="nav-tab active" data-page="dashboard" type="button">
                <span class="nav-icon">📊</span>
                <span class="nav-copy">
                    <span class="nav-label">Dashboard</span>
                    <span class="nav-desc">总览与趋势</span>
                </span>
            </button>
            <button class="nav-tab" data-page="today" type="button">
                <span class="nav-icon">✅</span>
                <span class="nav-copy">
                    <span class="nav-label">Today</span>
                    <span class="nav-desc">今日执行</span>
                </span>
            </button>
            <button class="nav-tab" data-page="plans" type="button">
                <span class="nav-icon">🗂️</span>
                <span class="nav-copy">
                    <span class="nav-label">Plans</span>
                    <span class="nav-desc">计划管理</span>
                </span>
            </button>
            <button class="nav-tab" data-page="create-plan" type="button">
                <span class="nav-icon">✨</span>
                <span class="nav-copy">
                    <span class="nav-label">Create</span>
                    <span class="nav-desc">AI 创建计划</span>
                </span>
            </button>
            <button class="nav-tab" data-page="ai-coach" type="button">
                <span class="nav-icon">🤝</span>
                <span class="nav-copy">
                    <span class="nav-label">AI Coach</span>
                    <span class="nav-desc">指导师工作台</span>
                </span>
            </button>
            <button class="nav-tab" data-page="records" type="button">
                <span class="nav-icon">📒</span>
                <span class="nav-copy">
                    <span class="nav-label">Records</span>
                    <span class="nav-desc">记录与趋势</span>
                </span>
            </button>
            <button class="nav-tab" data-page="analytics" type="button">
                <span class="nav-icon">📈</span>
                <span class="nav-copy">
                    <span class="nav-label">Analytics</span>
                    <span class="nav-desc">数据统计</span>
                </span>
            </button>
            <button class="nav-tab" data-page="community" type="button">
                <span class="nav-icon">🌐</span>
                <span class="nav-copy">
                    <span class="nav-label">Community</span>
                    <span class="nav-desc">分享执行现场</span>
                </span>
            </button>
            <button class="nav-tab" data-page="profile" type="button">
                <span class="nav-icon">👤</span>
                <span class="nav-copy">
                    <span class="nav-label">Profile</span>
                    <span class="nav-desc">档案与通知</span>
                </span>
            </button>
        </nav>

        <!-- 顶部导航栏 -->
        <nav id="top-nav" class="app-header">
            <div class="header-title-group">
                <div class="nav-title">Selfpline</div>
                <div class="nav-subtitle">习惯管理 / AI 指导师</div>
            </div>
            <div class="nav-actions">
                <button id="btn-notifications" type="button" aria-label="查看通知">🔔</button>
                <button id="btn-profile" type="button" aria-label="打开个人中心">👤</button>
            </div>
        </nav>

        <!-- 页面容器 -->
        <main id="page-container" class="app-main">
            <!-- 各页面由 JS 动态渲染至此 -->
        </main>

        <!-- 新建计划入口由首页今日计划列表内的 + 按钮触发，此按钮仅保留给旧逻辑兼容 -->
        <button id="fab-add-habit" class="hidden" title="新建习惯计划">+</button>

        <!-- Dialog: 选择计划目标 -->
        <div id="bottom-sheet" class="bottom-sheet-overlay hidden">
            <div class="bottom-sheet-content">
                <div class="sheet-handle"></div>
                <h2>你想创建什么方向的计划？</h2>
                <div class="direction-cards">
                    <div class="direction-card build" data-direction="BUILD" data-scene-key="build_exercise_habit">
                        <span class="direction-icon">🛠️</span>
                        <span class="direction-title">Build</span>
                        <span class="direction-desc">建立好习惯，从小动作稳定推进</span>
                    </div>
                    <div class="direction-card quit" data-direction="QUIT" data-scene-key="quit_stay_up_late">
                        <span class="direction-icon">🧯</span>
                        <span class="direction-title">Quit</span>
                        <span class="direction-desc">戒除坏习惯，先识别触发再替代</span>
                    </div>
                </div>
                <button class="sheet-close">取消</button>
            </div>
        </div>

        <!-- Toast 消息容器 -->
        <div id="toast-container"></div>
    </div>

    <script src="js/api/api-client.js"></script>
    <script src="js/components/habit-card.js"></script>
    <script src="js/components/bottom-sheet.js"></script>
    <script src="js/components/coach-selector.js"></script>
    <script src="js/components/daily-tracker.js"></script>
    <script src="js/components/chart-kit.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/today.js"></script>
    <script src="js/pages/plans.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/ai-coach.js"></script>
    <script src="js/pages/ai-classroom.js"></script>
    <script src="js/pages/plan-detail.js"></script>
    <script src="js/pages/health-checkin.js"></script>
    <script src="js/pages/analytics.js"></script>
    <script src="js/pages/community.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
